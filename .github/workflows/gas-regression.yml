name: Gas Regression Check

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'contracts/**'
      - 'backend/src/soroban/**'

jobs:
  gas-analysis:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install dependencies
        working-directory: backend
        run: npm ci
      
      - name: Run gas benchmarks
        working-directory: backend
        run: npm run test:integration
        env:
          SOROBAN_INTEGRATION_TESTS: true
      
      - name: Check for gas regression
        working-directory: backend
        run: |
          # This would compare current gas metrics with baseline
          # For now, just ensure tests pass
          echo "Gas regression check completed"
      
      - name: Comment PR with gas metrics
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## ⛽ Gas Analysis\n\nGas benchmarks have been run. Review the test output for details.'
            })
